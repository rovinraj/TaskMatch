{% extends "base.html" %}
{% block title %}New Listing{% endblock %}

{% block content %}
<div style="max-width:600px; margin:2rem auto; padding:0 1.5rem;">
  <a href="{{ url_for('main.dashboard') }}" style="font-size:.72rem; color:var(--amber); text-decoration:none;">← Back to Dashboard</a>
  <h2 style="font-family:'Playfair Display',serif; font-size:1.5rem; margin:1rem 0;">Create a New Listing</h2>

  <form method="POST" action="{{ url_for('main.new_listing') }}" style="background:var(--card-bg); border:1px solid var(--border); border-radius:var(--rl); padding:1.5rem;">
    <div class="form-field">
      <label class="label">Service Category</label>
      <select name="category_id" required>
        <option value="">Select a category…</option>
        {% for cat in categories %}
        <option value="{{ cat.category_id }}">{{ cat.category_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-field">
      <label class="label">Listing Title</label>
      <input type="text" name="title" placeholder="e.g. Emergency Plumbing Repair" required />
    </div>
    <div class="form-field">
      <label class="label">Description</label>
      <textarea name="description" rows="4" placeholder="Describe the services you offer…"></textarea>
    </div>
    <div class="form-field">
      <label class="label">Price ($)</label>
      <input type="number" name="price" placeholder="e.g. 75" min="0" step="0.01" />
    </div>
    <button type="submit" class="btn-amber" style="width:100%; margin-top:.5rem;">Create Listing →</button>
  </form>
</div>
{% endblock %}
